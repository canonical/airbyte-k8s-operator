name: Integration tests

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:

jobs:
  integration-tests:
    name: integration (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # microk8s coverage.
          - name: microk8s
            provider: microk8s
            use-canonical-k8s: "false"
            channel: 1.34-strict/stable
            microk8s-addons: "dns ingress rbac storage metallb:10.15.119.2-10.15.119.4 registry"
          # canonical-k8s coverage.
          - name: canonical-k8s
            provider: k8s
            use-canonical-k8s: "true"
            channel: 1.32-classic/stable
            microk8s-addons: "dns ingress rbac storage"
    uses: canonical/operator-workflows/.github/workflows/integration_test.yaml@main
    secrets: inherit
    permissions:
      contents: read
      packages: write
    with:
      provider: ${{ matrix.provider }}
      use-canonical-k8s: ${{ matrix.use-canonical-k8s == 'true' }}
      channel: ${{ matrix.channel }}
      microk8s-addons: ${{ matrix.microk8s-addons }}
      modules: '["test_charm.py", "test_upgrade.py", "test_scaling.py"]'
      juju-channel: 3/stable
      self-hosted-runner: true
      self-hosted-runner-label: "self-hosted-linux-amd64-noble-xlarge"
      builder-runner-label: "self-hosted-linux-amd64-noble-xlarge"
      trivy-severity-config: CRITICAL
      rockcraft-enable-security-nesting: true
      tmate-debug: false
      with-uv: true
